# /etc/nginx/sites-available/crm-preview
# Preview environments for Gest-o CRM:
#   https://pr-123-crm.demetraagronegocios.com.br
#   http://pr-123.crm.demetraagronegocios.com.br (fallback temporário)
#
# This server block is isolated to PR hosts so it does not affect
# the main production host crm.demetraagronegocios.com.br.

# Regex host capture: extracts PR number from pr-<number>-crm... or pr-<number>....
map $host $preview_pr_number {
    default "";
    ~^pr-(\d+)-crm\.demetraagronegocios\.com\.br$ $1;
    ~^pr-(\d+)\.crm\.demetraagronegocios\.com\.br$ $1;
}

# WebSocket connection upgrade support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP fallback server (without SSL) for preview subdomains.
server {
    listen 80;
    listen [::]:80;
    server_name
        ~^pr-(\d+)-crm\.demetraagronegocios\.com\.br$
        ~^pr-(\d+)\.crm\.demetraagronegocios\.com\.br$;

    access_log /var/log/nginx/preview_access.log;
    error_log /var/log/nginx/preview_error.log warn;

    # Safety: rejects hosts that do not follow pr-<number>...
    if ($preview_pr_number = "") {
        return 404;
    }

    set $preview_web_port 61$preview_pr_number;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_pass http://127.0.0.1:$preview_web_port;

        proxy_intercept_errors on;
        error_page 502 503 504 = @preview_unavailable_http;
    }

    location @preview_unavailable_http {
        default_type text/html;
        return 503 '<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Preview indisponível</title></head><body><h1>Preview indisponível (HTTP)</h1><p>Ambiente ainda não está pronto.</p></body></html>';
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name
        ~^pr-(\d+)-crm\.demetraagronegocios\.com\.br$
        ~^pr-(\d+)\.crm\.demetraagronegocios\.com\.br$;

    access_log /var/log/nginx/preview_access.log;
    error_log /var/log/nginx/preview_error.log warn;

    # Reuse the same certificate strategy used by your primary CRM vhost.
    # If you have a wildcard cert for *.demetraagronegocios.com.br, point to it here.
    ssl_certificate     /etc/letsencrypt/live/crm.demetraagronegocios.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.demetraagronegocios.com.br/privkey.pem;

    # Safety: rejects hosts that do not follow pr-<number>...
    if ($preview_pr_number = "") {
        return 404;
    }

    set $preview_web_port 61$preview_pr_number;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_pass http://127.0.0.1:$preview_web_port;

        proxy_intercept_errors on;
        error_page 502 503 504 = @preview_unavailable_tls;
    }

    location @preview_unavailable_tls {
        default_type text/html;
        return 503 '<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Preview indisponível</title></head><body><h1>Preview indisponível (HTTPS)</h1><p>Ambiente ainda não está pronto.</p></body></html>';
    }
}
