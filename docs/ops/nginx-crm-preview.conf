# /etc/nginx/sites-available/crm-preview
# Preview environments for Gest-o CRM:
#   https://pr-123.preview.crm.demetraagronegocios.com.br
#
# This server block is isolated to *.preview.crm... so it does not affect
# the main production host crm.demetraagronegocios.com.br.

# Regex host capture: extracts PR number from pr-<number>.preview...
map $host $preview_pr_number {
    default "";
    ~^pr-(\d+)\.preview\.crm\.demetraagronegocios\.com\.br$ $1;
}

# WebSocket connection upgrade support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS redirect only for preview subdomains
server {
    listen 80;
    listen [::]:80;
    server_name *.preview.crm.demetraagronegocios.com.br;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Wildcard + regex host matching
    server_name
        *.preview.crm.demetraagronegocios.com.br
        ~^pr-(\d+)\.preview\.crm\.demetraagronegocios\.com\.br$;

    # Reuse the same certificate strategy used by your primary CRM vhost.
    # If you have a wildcard cert for *.preview.crm..., point to it here.
    ssl_certificate     /etc/letsencrypt/live/crm.demetraagronegocios.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.demetraagronegocios.com.br/privkey.pem;

    # Safety: rejects hosts that do not follow pr-<number>.preview...
    if ($preview_pr_number = "") {
        return 404;
    }

    # Port convention requested:
    #   WEB_PORT = 61{PR_NUMBER}  (example: PR 123 => 61123)
    set $preview_web_port 61$preview_pr_number;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_pass http://127.0.0.1:$preview_web_port;

        # Friendly fallback if the PR container is down/not created
        proxy_intercept_errors on;
        error_page 502 503 504 = @preview_unavailable;
    }

    location @preview_unavailable {
        default_type text/html; 
        return 503 '<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Preview indisponível</title><style>body{font-family:Arial,sans-serif;margin:40px;color:#1f2937}h1{margin-bottom:8px}.box{max-width:640px;border:1px solid #e5e7eb;border-radius:8px;padding:20px;background:#f9fafb}</style></head><body><div class="box"><h1>Preview indisponível</h1><p>Este ambiente de preview ainda não está pronto ou foi removido.</p><p>Verifique se o PR possui deploy ativo e tente novamente em alguns segundos.</p></div></body></html>';
    }
}
