services:
  db:
    image: postgres:16
    restart: always
    command: postgres -c password_encryption=md5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-salesforce_pro}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-salesforce_pro}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}@db:5432/${POSTGRES_DB:-salesforce_pro}?schema=public}
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-https://crm.demetraagronegocios.com.br}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://crm.demetraagronegocios.com.br}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-refresh}
      SEED_ON_BOOTSTRAP: ${SEED_ON_BOOTSTRAP:-false}
      ENABLE_SMOKE_BOOTSTRAP: ${ENABLE_SMOKE_BOOTSTRAP:-false}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      ADMIN_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_ROLE: ${ADMIN_BOOTSTRAP_ROLE:-}
      ADMIN_BOOTSTRAP_REGION: ${ADMIN_BOOTSTRAP_REGION:-}
      CNPJ_LOOKUP_PROVIDER: ${CNPJ_LOOKUP_PROVIDER:-brasilapi}
      CNPJ_LOOKUP_BASE_URL: ${CNPJ_LOOKUP_BASE_URL:-https://brasilapi.com.br/api/cnpj/v1}
      CNPJ_LOOKUP_API_KEY: ${CNPJ_LOOKUP_API_KEY:-}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      SMOKE_DIRECTOR_EMAIL: diretor@empresa.com
      SMOKE_DIRECTOR_PASSWORD: "123456"
    ports:
      - "${API_PORT:-4000}:4000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  web:
    restart: always
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-gest-o_pgdata}
