services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salesforce_pro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d salesforce_pro"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/salesforce_pro?schema=public
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_ACCESS_SECRET: super-access
      JWT_REFRESH_SECRET: super-refresh
      SEED_ON_BOOTSTRAP: "false"
      ENABLE_SMOKE_BOOTSTRAP: "true"
      SMOKE_DIRECTOR_EMAIL: diretor@empresa.com
      SMOKE_DIRECTOR_PASSWORD: "123456"
    ports:
      - "4000:4000"
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:4000/health\").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  pgdata:
