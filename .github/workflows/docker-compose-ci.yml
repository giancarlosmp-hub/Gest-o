name: Docker Compose CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build workspace @salesforce-pro/shared
        run: npm run build -w @salesforce-pro/shared

      - name: Build workspace @salesforce-pro/web
        run: npm run build -w @salesforce-pro/web

      - name: Build workspace @salesforce-pro/api
        run: npm run build -w @salesforce-pro/api

      - name: Type check (all workspaces)
        run: npm run typecheck

      - name: Build and start stack
        env:
          ENABLE_SMOKE_BOOTSTRAP: "true"
          SEED_ON_BOOTSTRAP: "true"
        run: docker compose up -d --build

      - name: Print API logs on failure
        if: failure()
        run: docker compose logs api

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs api
          exit 1

      - name: Smoke test API main endpoints
        run: node scripts/smoke/api-endpoints-smoke.mjs

      - name: Smoke test auth login
        continue-on-error: true
        run: |
          TMP_LOGIN_RESPONSE="$(mktemp)"
          set +e
          curl -i -sS -X POST http://localhost:4000/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"diretor@empresa.com","password":"123456"}' \
            -o "$TMP_LOGIN_RESPONSE"
          CURL_EXIT_CODE="$?"
          set -e

          LOGIN_HTTP_STATUS="$(awk 'BEGIN { code = "" } /^HTTP\/[0-9.]+ [0-9]+/ { code = $2 } END { print code }' "$TMP_LOGIN_RESPONSE")"
          if [ -z "$LOGIN_HTTP_STATUS" ]; then
            LOGIN_HTTP_STATUS="000"
          fi

          LOGIN_RESPONSE_BODY="$(awk 'f { print } /^\r?$/ { f = 1 }' "$TMP_LOGIN_RESPONSE" | tr -d '\r')"

          echo "LOGIN_HTTP_STATUS=$LOGIN_HTTP_STATUS"
          echo "LOGIN_RESPONSE_BODY=$LOGIN_RESPONSE_BODY"
          echo "LOGIN_CURL_EXIT_CODE=$CURL_EXIT_CODE"

          {
            echo "LOGIN_HTTP_STATUS=$LOGIN_HTTP_STATUS"
            echo "LOGIN_RESPONSE_BODY<<EOF"
            printf '%s\n' "$LOGIN_RESPONSE_BODY"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Collect diagnostics after login attempt
        if: always()
        run: |
          docker compose logs api --tail=300
          docker compose ps
          docker compose exec -T api node -e "const { PrismaClient } = require('@prisma/client'); (async () => { const prisma = new PrismaClient(); const user = await prisma.user.findUnique({ where: { email: 'admin@preview.local' } }); console.log('USER_LOOKUP_RESULT: ' + JSON.stringify(user)); await prisma.\$disconnect(); })().catch(async (error) => { console.error(error); process.exitCode = 1; });"

      - name: Smoke test opportunities + dashboard flow
        run: node scripts/smoke/compose-smoke.mjs

      - name: Print service status
        if: always()
        run: docker compose ps

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Fail if login status is not 200
        if: always()
        run: |
          if [ "${LOGIN_HTTP_STATUS}" != "200" ]; then
            echo "Smoke auth login failed after collecting diagnostics"
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
