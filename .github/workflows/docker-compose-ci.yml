name: Docker Compose CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build workspace @salesforce-pro/shared
        run: npm run build -w @salesforce-pro/shared

      - name: Build workspace @salesforce-pro/web
        run: npm run build -w @salesforce-pro/web

      - name: Build workspace @salesforce-pro/api
        run: npm run build -w @salesforce-pro/api

      - name: Type check (all workspaces)
        run: npm run typecheck

      - name: Remove previous stack (volumes included)
        run: docker compose down -v

      - name: Prune docker images before rebuild
        run: docker image prune -af

      - name: Rebuild API image without cache
        run: docker compose build --no-cache api

      - name: Start stack
        env:
          ENABLE_SMOKE_BOOTSTRAP: "true"
          SEED_ON_BOOTSTRAP: "true"
        run: docker compose up -d

      - name: Show compose images
        run: docker compose images

      - name: Assert compose is not using fixed legacy image tag
        run: |
          IMAGES=$(docker compose images)
          echo "$IMAGES"
          if echo "$IMAGES" | grep -q "gest-o-api"; then
            echo "Legacy fixed image tag 'gest-o-api' is still present."
            exit 1
          fi
          if ! echo "$IMAGES" | grep -E -q "api"; then
            echo "API image entry not found in docker compose images output."
            exit 1
          fi

      - name: Print API startup logs (tail)
        run: docker compose logs api --tail=100

      - name: Assert bootstrap logs are from latest build
        run: |
          LOGS=$(docker compose logs api --tail=200)
          echo "$LOGS"
          if ! echo "$LOGS" | grep -q "BOOTSTRAP START"; then
            echo "Expected BOOTSTRAP START not found in API logs."
            echo "This may indicate stale/cached image still running."
            exit 1
          fi

      - name: Print API logs on failure
        if: failure()
        run: docker compose logs api

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs api
          exit 1

      - name: Smoke test API main endpoints
        run: node scripts/smoke/api-endpoints-smoke.mjs

      - name: Smoke test auth login
        run: |
          curl -f -X POST http://localhost:4000/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"diretor@empresa.com","password":"123456"}'

      - name: Assert login diagnostics logs
        run: |
          LOGS=$(docker compose logs api --tail=300)
          echo "$LOGS"
          if ! echo "$LOGS" | grep -q "LOGIN START"; then
            echo "Expected LOGIN START not found in API logs."
            echo "This may indicate stale/cached image still running."
            exit 1
          fi

      - name: Smoke test opportunities + dashboard flow
        run: node scripts/smoke/compose-smoke.mjs

      - name: Print service status
        if: always()
        run: docker compose ps

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
