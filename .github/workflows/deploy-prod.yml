on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy seguro em produção
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true

          script: |
            set -e

            APP_DIR="/apps/gest-o"
            DEPLOY_BRANCH="main"

            echo "Iniciando deploy seguro em produção"
            echo "Data/Hora (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
            else
              echo "ERRO: diretório de produção não encontrado em $APP_DIR"
              exit 1
            fi

            echo "Diretório atual (pwd): $(pwd)"
            echo "Sincronizando branch $DEPLOY_BRANCH"

            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"

            echo "Commit atual: $(git rev-parse --short HEAD)"

            echo "Reconstruindo e atualizando apenas web/api (sem remover volumes)"
            docker compose up -d --build api web

            echo "Status dos containers após deploy"
            docker compose ps

            echo "Volumes do projeto (filtro: gest-o/gesto/postgres)"
            docker volume ls --format '{{.Name}}' | grep -E 'gest-o|gesto|postgres' || true

            echo "Deploy concluído com segurança"
