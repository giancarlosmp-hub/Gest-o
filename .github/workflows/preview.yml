name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Validate required VPS secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_KEY: ${{ secrets.VPS_KEY }}
        run: |
          missing=()

          [ -n "${VPS_HOST}" ] || missing+=("VPS_HOST")
          [ -n "${VPS_USER}" ] || missing+=("VPS_USER")
          [ -n "${VPS_KEY}" ] || missing+=("VPS_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Configuração incompleta: defina os secrets obrigatórios no repositório: ${missing[*]}."
            echo "Por favor, configure-os em Settings > Secrets and variables > Actions."
            exit 1
          fi

          echo "✅ Secrets obrigatórios presentes. Continuando deploy de preview."

      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
          GITHUB_REPOSITORY: ${{ env.GITHUB_REPOSITORY }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -euo pipefail

            PREVIEW_DIR="/apps/previews/pr-${PR_NUMBER}"
            API_PORT="60${PR_NUMBER}"
            WEB_PORT="61${PR_NUMBER}"

            if [ -d "${PREVIEW_DIR}/.git" ]; then
              cd "${PREVIEW_DIR}"
              git fetch origin
              if git show-ref --verify --quiet "refs/heads/${PR_BRANCH}"; then
                git checkout "${PR_BRANCH}"
              else
                git checkout -b "${PR_BRANCH}" "origin/${PR_BRANCH}"
              fi
              git reset --hard "origin/${PR_BRANCH}"
            else
              mkdir -p "${PREVIEW_DIR}"
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${PREVIEW_DIR}"
              cd "${PREVIEW_DIR}"
              git checkout "${PR_BRANCH}"
            fi

            printf "VITE_API_URL=/api\nAPI_PORT=%s\nWEB_PORT=%s\n" "${API_PORT}" "${WEB_PORT}" > .env

            docker compose down || true
            docker compose up -d --build

            echo "Preview URL: https://pr-${PR_NUMBER}.crm.demetraagronegocios.com.br"

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL: ${{ env.PREVIEW_URL }}
