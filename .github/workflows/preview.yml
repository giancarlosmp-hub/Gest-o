name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PR_SHA: ${{ github.event.pull_request.head.sha }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
      PREVIEW_URL_HTTP: http://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VPS_HOST: ${{ secrets.VPS_HOST }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,PR_SHA,GITHUB_REPOSITORY,GITHUB_TOKEN,VPS_HOST
          script: |
            set -euo pipefail
            set -x

            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"
            PREVIEW_PROJECT="gesto-pr-${PR_NUMBER}"
            PREVIEW_DB="gesto_preview_pr_${PR_NUMBER}"
            PREVIEW_VOLUME="gesto_pgdata_pr_${PR_NUMBER}"
            PREVIEW_HOST_TLS="pr-${PR_NUMBER}-crm.demetraagronegocios.com.br"
            PREVIEW_HOST_HTTP="pr-${PR_NUMBER}.crm.demetraagronegocios.com.br"

            if [ -d "$PREVIEW_DIR" ]; then
              rm -rf "$PREVIEW_DIR"
            fi

            mkdir -p "$PREVIEW_DIR"
            cd "$PREVIEW_DIR"

            git clone --depth 1 --branch "${PR_BRANCH}" "https://github.com/${GITHUB_REPOSITORY}.git" .
            git fetch --depth 1 origin "${PR_SHA}"
            git checkout --detach "${PR_SHA}"

            cat > .env <<ENVFILE
            COMPOSE_PROJECT_NAME=${PREVIEW_PROJECT}
            POSTGRES_DB=${PREVIEW_DB}
            POSTGRES_VOLUME_NAME=${PREVIEW_VOLUME}
            ADMIN_BOOTSTRAP_ENABLED=true
            ADMIN_BOOTSTRAP_NAME=Admin Preview PR ${PR_NUMBER}
            ADMIN_BOOTSTRAP_EMAIL=admin+pr${PR_NUMBER}@preview.local
            ADMIN_BOOTSTRAP_PASSWORD=PreviewPr${PR_NUMBER}!123
            ADMIN_BOOTSTRAP_ROLE=diretor
            ADMIN_BOOTSTRAP_REGION=Nacional
            SEED_ON_BOOTSTRAP=false
            ENABLE_SMOKE_BOOTSTRAP=false
            WEB_PORT=61${PR_NUMBER}
            API_PORT=40${PR_NUMBER}
            ENVFILE

            if [ ! -d .git ]; then
              echo "ERROR: Invalid repository state - .git directory is missing"
              exit 1
            fi

            # Garantir nginx para preview com HTTP(80) e HTTPS(443), logs e headers.
            sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            sudo cp docs/ops/nginx-crm-preview.conf /etc/nginx/sites-available/crm-preview
            sudo ln -sfn /etc/nginx/sites-available/crm-preview /etc/nginx/sites-enabled/crm-preview
            sudo nginx -t
            sudo systemctl reload nginx

            # Verificação de DNS do domínio de preview.
            if ! command -v dig >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y dnsutils
            fi
            echo "DNS for ${PREVIEW_HOST_TLS}"
            dig +short A "${PREVIEW_HOST_TLS}" || true
            echo "DNS for ${PREVIEW_HOST_HTTP}"
            dig +short A "${PREVIEW_HOST_HTTP}" || true
            echo "Expected VPS host/IP: ${VPS_HOST}"

            export API_PORT="40${PR_NUMBER}"
            export COMPOSE_PROJECT_NAME="${PREVIEW_PROJECT}"
            export POSTGRES_DB="${PREVIEW_DB}"
            export POSTGRES_VOLUME_NAME="${PREVIEW_VOLUME}"
            echo "Using API_PORT=${API_PORT}"
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml up -d --build

            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${API_PORT}/health" || true)
              if [ "$STATUS" = "200" ]; then
                echo "API healthy on 127.0.0.1:${API_PORT}"
                break
              fi
              sleep 2
            done

            curl -i -sS "http://127.0.0.1:${API_PORT}/debug/admin"
            curl -i -sS -X POST "http://127.0.0.1:${API_PORT}/auth/login" \
              -H "Content-Type: application/json" \
              --data "{\"email\":\"admin+pr${PR_NUMBER}@preview.local\",\"password\":\"PreviewPr${PR_NUMBER}!123\"}"
            curl -i -sS -X POST "http://127.0.0.1:${API_PORT}/auth/login" \
              -H "Content-Type: application/json" \
              --data '{"email":"diretor@empresa.com","password":"123456"}'

            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              env ADMIN_DIAG_EMAIL="admin+pr${PR_NUMBER}@preview.local" ADMIN_DIAG_PASSWORD="PreviewPr${PR_NUMBER}!123" \
              npm run admin:diagnose-hash -w @salesforce-pro/api

            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              node -e "const { PrismaClient } = require('@prisma/client'); const p = new PrismaClient(); (async () => { const users = await p.user.findMany({ select: { email: true, role: true, isActive: true }, orderBy: { createdAt: 'desc' }, take: 5 }); console.log(JSON.stringify({ project: process.env.COMPOSE_PROJECT_NAME, users }, null, 2)); await p.$disconnect(); })().catch(async (e) => { console.error(e); process.exitCode = 1; });"

            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=300
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml ps

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL (HTTPS): ${{ env.PREVIEW_URL }}
            Preview URL (HTTP fallback): ${{ env.PREVIEW_URL_HTTP }}
