name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
          GITHUB_REPOSITORY: ${{ env.GITHUB_REPOSITORY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -x

            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"

            if [ -d "$PREVIEW_DIR/.git" ]; then
              echo "Atualizando repositório existente..."
              cd "$PREVIEW_DIR"
              git fetch origin
              git checkout "$PR_BRANCH"
              git reset --hard "origin/$PR_BRANCH"
            else
              echo "Clonando repositório novo..."
              rm -rf "$PREVIEW_DIR"
              git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git "$PREVIEW_DIR"
              cd "$PREVIEW_DIR"
              git checkout "$PR_BRANCH"
            fi

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL: ${{ env.PREVIEW_URL }}
