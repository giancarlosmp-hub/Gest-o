name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,PREVIEW_URL,GITHUB_TOKEN
          script: |
            set -euo pipefail

            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            WEB_PORT="61${PR_NUMBER}"
            API_PORT="62${PR_NUMBER}"
            POSTGRES_VOLUME_NAME="gest-o_pgdata_pr_${PR_NUMBER}"

            mkdir -p "$PREVIEW_DIR"

            if [ ! -d "$PREVIEW_DIR/.git" ]; then
              git clone --branch "$PR_BRANCH" --single-branch "$REPO_URL" "$PREVIEW_DIR"
            fi

            cd "$PREVIEW_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --prune origin
            git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"
            git reset --hard "origin/$PR_BRANCH"

            cat > .env <<EOF
            NODE_ENV=production
            WEB_PORT=${WEB_PORT}
            API_PORT=${API_PORT}
            VITE_API_URL=/api
            FRONTEND_URL=${PREVIEW_URL}
            CORS_ALLOWED_ORIGINS=${PREVIEW_URL}
            ADMIN_BOOTSTRAP_ENABLED=true
            ADMIN_BOOTSTRAP_EMAIL=admin@preview.com
            ADMIN_BOOTSTRAP_PASSWORD=123456
            ADMIN_BOOTSTRAP_NAME=Admin Preview
            POSTGRES_VOLUME_NAME=${POSTGRES_VOLUME_NAME}
            COMPOSE_PROJECT_NAME=gesto-pr-${PR_NUMBER}
            EOF

            docker compose --env-file .env down --remove-orphans || true
            docker compose --env-file .env pull || true
            docker compose --env-file .env up -d --build

            # validações robustas: aguarda stack sair de "health: starting" antes de falhar
            docker compose --env-file .env exec -T api sh -lc 'echo "$ADMIN_BOOTSTRAP_ENABLED" | grep -q "true"'

            MAX_ATTEMPTS=120
            SLEEP_SECONDS=5
            ATTEMPT=1
            READY=0

            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              echo "[preview] readiness attempt ${ATTEMPT}/${MAX_ATTEMPTS}"
              docker compose --env-file .env ps || true

              WEB_OK=0
              API_OK=0

              if curl --fail --silent --show-error "http://127.0.0.1:${WEB_PORT}/healthz" >/dev/null; then
                WEB_OK=1
              fi

              if curl --fail --silent --show-error "http://127.0.0.1:${API_PORT}/health" >/dev/null; then
                API_OK=1
              elif curl --fail --silent --show-error "http://127.0.0.1:${WEB_PORT}/api/health" >/dev/null; then
                API_OK=1
              fi

              if [ "$WEB_OK" -eq 1 ] && [ "$API_OK" -eq 1 ]; then
                READY=1
                echo "[preview] stack ready (web + api saudáveis)"
                break
              fi

              ATTEMPT=$((ATTEMPT + 1))
              sleep "$SLEEP_SECONDS"
            done

            if [ "$READY" -ne 1 ]; then
              echo "[preview] stack não ficou pronta dentro do timeout"
              docker compose --env-file .env ps || true
              docker compose --env-file .env logs api --tail=100 || true
              docker compose --env-file .env logs web --tail=100 || true
              docker compose --env-file .env logs db --tail=100 || true
              exit 1
            fi

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL: ${{ env.PREVIEW_URL }}
            Credenciais: admin@preview.com / 123456
