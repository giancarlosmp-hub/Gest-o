name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -euo pipefail
            set -x

            echo "PR_NUMBER=$PR_NUMBER"
            echo "PR_BRANCH=$PR_BRANCH"
            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"

            echo "Cleaning directory..."
            if [ -d "$PREVIEW_DIR" ]; then
              rm -rf "$PREVIEW_DIR"
            fi

            echo "Creating directory..."
            mkdir -p "$PREVIEW_DIR"
            cd "$PREVIEW_DIR"

            echo "Cloning repository..."
            git clone --depth 1 --branch "${PR_BRANCH}" "https://github.com/${GITHUB_REPOSITORY}.git" .

            echo "Checkout branch..."
            git checkout "${PR_BRANCH}"

            echo "Validating .git directory..."
            if [ ! -d .git ]; then
              echo "ERROR: Invalid repository state - .git directory is missing"
              exit 1
            fi

            cat > .env <<EOF
            ADMIN_BOOTSTRAP_ENABLED=true
            EOF

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL: ${{ env.PREVIEW_URL }}
