name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Deploy preview on VPS
        if: ${{ secrets.VPS_HOST != "" && secrets.VPS_USER != "" && secrets.VPS_KEY != "" }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -euo pipefail

            echo "[stage] init"
            echo "PR_NUMBER=$PR_NUMBER"
            echo "PR_BRANCH=$PR_BRANCH"

            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"
            API_PORT="$((4000 + PR_NUMBER))"
            WEB_PORT="$((5173 + PR_NUMBER))"
            PREVIEW_URL="https://pr-${PR_NUMBER}-crm.demetraagronegocios.com.br"

            mkdir -p "$PREVIEW_DIR"
            cd "$PREVIEW_DIR"

            if [ -d ".git" ]; then
              echo "Atualizando repo existente..."
              git fetch origin
              git reset --hard "origin/${PR_BRANCH}"
            else
              echo "Diretório sem repo, limpando e clonando..."
              rm -rf ./*
              rm -rf .git || true

              git clone "https://github.com/${GITHUB_REPOSITORY}.git" .
              git checkout "${PR_BRANCH}"
            fi

            if [ ! -f docker-compose.yml ]; then
              echo "ERRO: docker-compose.yml não encontrado"
              exit 1
            fi

            cat > .env <<EOF
            PR_NUMBER=${PR_NUMBER}
            PREVIEW_DB_NAME=salesforce_preview_pr_${PR_NUMBER}
            PG_VOLUME_NAME=gest-o_pgdata_pr_${PR_NUMBER}
            API_PORT=${API_PORT}
            WEB_PORT=${WEB_PORT}
            VITE_API_URL=${PREVIEW_URL}/api
            FRONTEND_URL=${PREVIEW_URL}
            CORS_ALLOWED_ORIGINS=${PREVIEW_URL}
            ADMIN_BOOTSTRAP_ENABLED=true
            ADMIN_BOOTSTRAP_EMAIL=admin@preview.com
            ADMIN_BOOTSTRAP_PASSWORD=123456
            ADMIN_BOOTSTRAP_NAME=Admin Preview
            EOF

            echo "[stage] docker down"
            docker compose down -v || true
            echo "[stage] docker pull"
            docker compose pull || true
            echo "[stage] docker up"
            docker compose up -d --build

            echo "[stage] post-up diagnostics"
            docker compose ps
            docker compose logs api --tail=200

            MAX_ATTEMPTS=60
            SLEEP=5

            for i in $(seq 1 "$MAX_ATTEMPTS"); do
              echo "Tentativa $i..."

              if curl -fsS "http://127.0.0.1:${WEB_PORT}/healthz" && \
                 curl -fsS "http://127.0.0.1:${API_PORT}/health"; then
                echo "Stack pronta"
                exit 0
              fi

              sleep "$SLEEP"
            done

            echo "ERRO: stack não ficou pronta"

            echo "[stage] post-up diagnostics"
            docker compose ps
            docker compose logs api --tail=200
            docker compose logs web --tail=100
            docker compose logs db --tail=100

            exit 1

      - name: Comment preview link on PR
        if: ${{ success() && secrets.VPS_HOST != "" && secrets.VPS_USER != "" && secrets.VPS_KEY != "" }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL: ${{ env.PREVIEW_URL }}
