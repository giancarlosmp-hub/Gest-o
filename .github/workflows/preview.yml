name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
      PREVIEW_URL_HTTP: http://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VPS_HOST: ${{ secrets.VPS_HOST }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN,VPS_HOST
          script: |
            set -euo pipefail
            set -x

            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"
            PREVIEW_PROJECT="gesto-pr-${PR_NUMBER}"
            PREVIEW_DB="salesforce_pro_preview_pr_${PR_NUMBER}"
            PREVIEW_VOLUME="gest-o_pgdata_pr_${PR_NUMBER}"
            PREVIEW_HOST_TLS="pr-${PR_NUMBER}-crm.demetraagronegocios.com.br"
            PREVIEW_HOST_HTTP="pr-${PR_NUMBER}.crm.demetraagronegocios.com.br"
            API_PORT="40${PR_NUMBER}"
            WEB_PORT="61${PR_NUMBER}"
            ADMIN_EMAIL="admin+pr${PR_NUMBER}@preview.local"
            ADMIN_PASSWORD="PreviewPr${PR_NUMBER}!123"

            collect_preview_debug() {
              echo "=== PREVIEW DOCKER COMPOSE PS ==="
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml ps || true

              echo "=== PREVIEW DOCKER PS -A ==="
              docker ps -a || true

              echo "=== PREVIEW DOCKER NETWORK LS ==="
              docker network ls || true

              echo "=== PREVIEW DOCKER VOLUME LS ==="
              docker volume ls || true

              echo "=== PREVIEW API LOGS ==="
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=300 || true

              echo "=== PREVIEW WEB LOGS ==="
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs web --tail=300 || true

              echo "=== NGINX PREVIEW ERROR LOG ==="
              sudo tail -n 300 /var/log/nginx/preview_error.log || true

              echo "=== NGINX PREVIEW ACCESS LOG ==="
              sudo tail -n 300 /var/log/nginx/preview_access.log || true

              echo "=== NGINX DEFAULT ERROR LOG ==="
              sudo tail -n 300 /var/log/nginx/error.log || true

              echo "=== NGINX DEFAULT ACCESS LOG ==="
              sudo tail -n 300 /var/log/nginx/access.log || true
            }

            echo "=== PREVIEW CLEAN START ==="
            echo "COMPOSE_PROJECT_NAME=${PREVIEW_PROJECT}"
            echo "POSTGRES_DB=${PREVIEW_DB}"
            echo "POSTGRES_VOLUME_NAME=${PREVIEW_VOLUME}"
            echo "API_PORT=${API_PORT}"
            echo "WEB_PORT=${WEB_PORT}"

            if [ -d "$PREVIEW_DIR" ]; then
              rm -rf "$PREVIEW_DIR"
            fi

            mkdir -p "$PREVIEW_DIR"
            cd "$PREVIEW_DIR"

            git clone --depth 1 --branch "${PR_BRANCH}" "https://github.com/${GITHUB_REPOSITORY}.git" .
            git checkout "${PR_BRANCH}"

            cat > .env <<ENVFILE
            COMPOSE_PROJECT_NAME=${PREVIEW_PROJECT}
            POSTGRES_DB=${PREVIEW_DB}
            POSTGRES_VOLUME_NAME=${PREVIEW_VOLUME}
            ADMIN_BOOTSTRAP_ENABLED=true
            ADMIN_BOOTSTRAP_NAME=Admin Preview PR ${PR_NUMBER}
            ADMIN_BOOTSTRAP_EMAIL=${ADMIN_EMAIL}
            ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_PASSWORD}
            ADMIN_BOOTSTRAP_ROLE=diretor
            ADMIN_BOOTSTRAP_REGION=Nacional
            SEED_ON_BOOTSTRAP=false
            ENABLE_SMOKE_BOOTSTRAP=false
            WEB_PORT=${WEB_PORT}
            API_PORT=${API_PORT}
            ENVFILE

            sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            sudo cp docs/ops/nginx-crm-preview.conf /etc/nginx/sites-available/crm-preview
            sudo ln -sfn /etc/nginx/sites-available/crm-preview /etc/nginx/sites-enabled/crm-preview
            sudo nginx -t
            sudo systemctl reload nginx

            export API_PORT="${API_PORT}"
            export WEB_PORT="${WEB_PORT}"
            export COMPOSE_PROJECT_NAME="${PREVIEW_PROJECT}"
            export POSTGRES_DB="${PREVIEW_DB}"
            export POSTGRES_VOLUME_NAME="${PREVIEW_VOLUME}"

            echo "=== FULL CLEANUP BEFORE START ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml down --volumes --remove-orphans || true
            docker rm -f $(docker ps -aq --filter "name=${PREVIEW_PROJECT}") 2>/dev/null || true
            docker volume rm -f "${PREVIEW_VOLUME}" 2>/dev/null || true

            echo "=== STARTUP ORDER: DB/API/WEB ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml up -d --build
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml ps

            DB_HEALTHY=false
            for i in {1..60}; do
              DB_CONTAINER_ID=$(docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml ps -q db || true)
              if [ -n "${DB_CONTAINER_ID}" ]; then
                DB_STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${DB_CONTAINER_ID}" || true)
                if [ "${DB_STATUS}" = "healthy" ] || [ "${DB_STATUS}" = "running" ]; then
                  echo "DB healthy"
                  DB_HEALTHY=true
                  break
                fi
              fi
              sleep 2
            done

            if [ "${DB_HEALTHY}" != "true" ]; then
              echo "DB did not become healthy in time"
              collect_preview_debug
              exit 1
            fi

            API_HEALTHY=false
            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${API_PORT}/health" || true)
              if [ "${STATUS}" = "200" ]; then
                echo "API healthy"
                API_HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "${API_HEALTHY}" != "true" ]; then
              echo "API did not become healthy in time"
              collect_preview_debug
              exit 1
            fi

            WEB_HEALTHY=false
            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${WEB_PORT}/healthz" || true)
              if [ "${STATUS}" = "200" ]; then
                echo "WEB healthy"
                WEB_HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "${WEB_HEALTHY}" != "true" ]; then
              echo "WEB did not become healthy in time"
              collect_preview_debug
              exit 1
            fi

            PROXY_HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: ${PREVIEW_HOST_HTTP}" "http://127.0.0.1/healthz" || true)
            PROXY_HTTPS_STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" --resolve "${PREVIEW_HOST_TLS}:443:127.0.0.1" "https://${PREVIEW_HOST_TLS}/healthz" || true)

            echo "Proxy HTTP status: ${PROXY_HTTP_STATUS}"
            echo "Proxy HTTPS status: ${PROXY_HTTPS_STATUS}"

            if [ "${PROXY_HTTP_STATUS}" != "200" ]; then
              echo "Proxy HTTP check failed with status ${PROXY_HTTP_STATUS}"
              collect_preview_debug
              exit 1
            fi

            if [ "${PROXY_HTTPS_STATUS}" != "200" ]; then
              echo "Proxy HTTPS check failed with status ${PROXY_HTTPS_STATUS}"
              collect_preview_debug
              exit 1
            fi

            echo "=== ENSURE PREVIEW ADMIN USER ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              sh -lc 'pwd; ls -la; ls -la dist || true; ls -la apps/api/dist || true; ls -la apps/api/dist/scripts || true'
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              node apps/api/dist/scripts/adminEnsureUser.js

            echo "=== VERIFY ADMIN EXISTS IN DB ==="
            DB_CONTAINER=$(docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml ps -q db)
            if [ -z "${DB_CONTAINER}" ]; then
              echo "DB container not found"
              collect_preview_debug
              exit 1
            fi

            USER_EXISTS=$(
              docker exec -e PGPASSWORD=postgres "${DB_CONTAINER}" \
                psql -U postgres -d "${PREVIEW_DB}" -tAc "SELECT email FROM \"User\" WHERE email='${ADMIN_EMAIL}' LIMIT 1;" \
                | tr -d '[:space:]'
            )

            if [ "${USER_EXISTS}" != "${ADMIN_EMAIL}" ]; then
              echo "Preview admin user not found in DB"
              collect_preview_debug
              exit 1
            fi

            echo "Preview admin found in DB: ${USER_EXISTS}"

            echo "=== LOGIN ADMIN PREVIEW ==="
            LOGIN_STATUS=$(curl -s -o /tmp/preview_login_response.txt -w "%{http_code}" -X POST "http://127.0.0.1:${API_PORT}/auth/login" \
              -H "Content-Type: application/json" \
              --data "{\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${ADMIN_PASSWORD}\"}" || true)

            cat /tmp/preview_login_response.txt || true
            echo
            echo "Login status: ${LOGIN_STATUS}"

            if [ "${LOGIN_STATUS}" != "200" ]; then
              echo "Preview login failed"
              collect_preview_debug
              exit 1
            fi

            echo "=== DIAGNOSE HASH ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              env ADMIN_DIAG_EMAIL="${ADMIN_EMAIL}" ADMIN_DIAG_PASSWORD="${ADMIN_PASSWORD}" \
              npm run auth:diagnose-hash -w @salesforce-pro/api

            echo "=== DEBUG ADMIN ==="
            curl -i "http://127.0.0.1:${API_PORT}/debug/admin" || true

            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=200 || true

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL (HTTPS): ${{ env.PREVIEW_URL }}
            Preview URL (HTTP fallback): ${{ env.PREVIEW_URL_HTTP }}
