name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
          GITHUB_REPOSITORY: ${{ env.GITHUB_REPOSITORY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -x
            echo "===== DEBUG START ====="

            echo "PR_NUMBER=$PR_NUMBER"
            echo "PR_BRANCH=$PR_BRANCH"
            echo "PWD=$(pwd)"

            echo "===== TESTE DOCKER ====="
            docker ps || echo "ERRO DOCKER PS"

            echo "===== TESTE DIRETORIO ====="
            PREVIEW_DIR="/apps/previews/pr-${PR_NUMBER}"
            echo "DIR: $PREVIEW_DIR"
            ls -la /apps || echo "ERRO LISTAR /apps"

            echo "===== TESTE GIT ====="
            if [ -d "$PREVIEW_DIR/.git" ]; then
              cd "$PREVIEW_DIR"
              git status || echo "ERRO GIT STATUS"
            else
              echo "DIRETORIO NÃO EXISTE"
            fi

            echo "===== TESTE DOCKER COMPOSE ====="
            docker compose version || echo "ERRO DOCKER COMPOSE"

            echo "===== FIM DEBUG ====="

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL: ${{ env.PREVIEW_URL }}
