name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}-crm.demetraagronegocios.com.br
      PREVIEW_URL_HTTP: http://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VPS_HOST: ${{ secrets.VPS_HOST }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22022
          script_stop: true
          envs: PR_NUMBER,PR_BRANCH,GITHUB_REPOSITORY,GITHUB_TOKEN,VPS_HOST
          script: |
            set -euo pipefail
            set -x

            PREVIEW_DIR="/var/www/preview/pr-${PR_NUMBER}"
            PREVIEW_PROJECT="gesto-pr-${PR_NUMBER}"
            PREVIEW_DB="salesforce_pro_preview_pr_${PR_NUMBER}"
            PREVIEW_VOLUME="gest-o_pgdata_pr_${PR_NUMBER}"
            PREVIEW_HOST_TLS="pr-${PR_NUMBER}-crm.demetraagronegocios.com.br"
            PREVIEW_HOST_HTTP="pr-${PR_NUMBER}.crm.demetraagronegocios.com.br"

            if [ -d "$PREVIEW_DIR" ]; then
              rm -rf "$PREVIEW_DIR"
            fi

            mkdir -p "$PREVIEW_DIR"
            cd "$PREVIEW_DIR"

            git clone --depth 1 --branch "${PR_BRANCH}" "https://github.com/${GITHUB_REPOSITORY}.git" .
            git checkout "${PR_BRANCH}"

            cat > .env <<ENVFILE
            COMPOSE_PROJECT_NAME=${PREVIEW_PROJECT}
            POSTGRES_DB=${PREVIEW_DB}
            POSTGRES_VOLUME_NAME=${PREVIEW_VOLUME}
            ADMIN_BOOTSTRAP_ENABLED=true
            ADMIN_BOOTSTRAP_NAME=Admin Preview PR ${PR_NUMBER}
            ADMIN_BOOTSTRAP_EMAIL=admin+pr${PR_NUMBER}@preview.local
            ADMIN_BOOTSTRAP_PASSWORD=PreviewPr${PR_NUMBER}!123
            ADMIN_BOOTSTRAP_ROLE=diretor
            ADMIN_BOOTSTRAP_REGION=Nacional
            SEED_ON_BOOTSTRAP=false
            ENABLE_SMOKE_BOOTSTRAP=false
            WEB_PORT=61${PR_NUMBER}
            API_PORT=40${PR_NUMBER}
            ENVFILE

            sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            sudo cp docs/ops/nginx-crm-preview.conf /etc/nginx/sites-available/crm-preview
            sudo ln -sfn /etc/nginx/sites-available/crm-preview /etc/nginx/sites-enabled/crm-preview
            sudo nginx -t
            sudo systemctl reload nginx

            export API_PORT="40${PR_NUMBER}"
            export WEB_PORT="61${PR_NUMBER}"
            export COMPOSE_PROJECT_NAME="${PREVIEW_PROJECT}"
            export POSTGRES_DB="${PREVIEW_DB}"
            export POSTGRES_VOLUME_NAME="${PREVIEW_VOLUME}"
            set -a
            . ./.env
            set +a

            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml down --remove-orphans || true
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml up -d --build
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml ps

            API_HEALTHY=false
            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${API_PORT}/health" || true)
              if [ "$STATUS" = "200" ]; then
                echo "API healthy"
                API_HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "$API_HEALTHY" != "true" ]; then
              echo "API did not become healthy in time"
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=200 || true
              exit 1
            fi

            WEB_HEALTHY=false
            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${WEB_PORT}/healthz" || true)
              if [ "$STATUS" = "200" ]; then
                echo "WEB healthy"
                WEB_HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "$WEB_HEALTHY" != "true" ]; then
              echo "WEB did not become healthy in time"
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs web --tail=200 || true
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=200 || true
              exit 1
            fi

            PROXY_HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: ${PREVIEW_HOST_HTTP}" "http://127.0.0.1/" || true)
            PROXY_HTTPS_STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" --resolve "${PREVIEW_HOST_TLS}:443:127.0.0.1" "https://${PREVIEW_HOST_TLS}/" || true)
            echo "Proxy HTTP status: ${PROXY_HTTP_STATUS}"
            echo "Proxy HTTPS status: ${PROXY_HTTPS_STATUS}"

            if [ "${PROXY_HTTP_STATUS}" != "200" ] || [ "${PROXY_HTTPS_STATUS}" != "200" ]; then
              echo "Reverse proxy check failed"
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs web --tail=200 || true
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=200 || true
              sudo tail -n 200 /var/log/nginx/preview_error.log || true
              exit 1
            fi

            echo "=== BOOTSTRAP ADMIN ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              sh -lc 'pwd; ls -la; ls -la dist || true; ls -la apps/api/dist || true; ls -la apps/api/dist/scripts || true'
            echo "=== ENV CHECK (ADMIN_BOOTSTRAP_*) ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              sh -lc 'printenv | grep ADMIN_BOOTSTRAP | sort'
            echo "=== ENV CHECK (DATABASE_URL) ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              sh -lc 'printenv | grep DATABASE_URL'
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              npm run docker:start -w @salesforce-pro/api
            echo "Bootstrap executed"
            echo "Admin ensured"

            echo "=== DB CHECK (RECENT USERS) ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              node -e "const { PrismaClient } = require('@prisma/client'); const prisma = new PrismaClient(); (async () => { const users = await prisma.user.findMany({ orderBy: { createdAt: 'desc' }, take: 10, select: { id: true, email: true, role: true, isActive: true, createdAt: true, passwordHash: true } }); console.log(JSON.stringify(users.map((u) => ({ ...u, hashPrefix: u.passwordHash?.slice(0, 4), hashLength: u.passwordHash?.length })), null, 2)); await prisma.\$disconnect(); })().catch(async (err) => { console.error(err); await prisma.\$disconnect(); process.exit(1); });"
            echo "=== DB CHECK (EXPECTED ADMIN) ==="
            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              node -e "const { PrismaClient } = require('@prisma/client'); const prisma = new PrismaClient(); (async () => { const email = 'admin+pr${PR_NUMBER}@preview.local'; const user = await prisma.user.findUnique({ where: { email }, select: { id: true, email: true, role: true, isActive: true, passwordHash: true, createdAt: true, updatedAt: true } }); if (!user) { console.error('EXPECTED_ADMIN_NOT_FOUND', email); process.exit(1); } console.log(JSON.stringify({ ...user, hashPrefix: user.passwordHash?.slice(0, 4), hashLength: user.passwordHash?.length }, null, 2)); await prisma.\$disconnect(); })().catch(async (err) => { console.error(err); await prisma.\$disconnect(); process.exit(1); });"

            echo "=== DEBUG ADMIN ==="
            curl -i "http://127.0.0.1:${API_PORT}/debug/admin"

            echo "=== LOGIN ADMIN PREVIEW ==="
            curl -i -X POST "http://127.0.0.1:${API_PORT}/auth/login" \
              -H "Content-Type: application/json" \
              --data "{\"email\":\"admin+pr${PR_NUMBER}@preview.local\",\"password\":\"PreviewPr${PR_NUMBER}!123\"}"

            echo "=== DIAGNOSE HASH ==="
            set +e
            DIAG_OUTPUT=$(
              docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
                env ADMIN_DIAG_EMAIL="admin+pr${PR_NUMBER}@preview.local" ADMIN_DIAG_PASSWORD="PreviewPr${PR_NUMBER}!123" \
                npm run auth:diagnose-hash -w @salesforce-pro/api 2>&1
            )
            DIAG_STATUS=$?
            set -e
            echo "$DIAG_OUTPUT"
            if echo "$DIAG_OUTPUT" | grep -q "user_not_found"; then
              echo "Diagnose result: user_not_found (blocking)."
              exit 1
            fi
            if [ "$DIAG_STATUS" -ne 0 ]; then
              echo "Diagnose exited with status ${DIAG_STATUS}; blocking deploy."
              exit "$DIAG_STATUS"
            fi

            docker compose -p "${PREVIEW_PROJECT}" -f docker-compose.yml -f docker-compose.preview.yml logs api --tail=200

      - name: Comment preview link on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Preview environment updated.

            Preview URL (HTTPS): ${{ env.PREVIEW_URL }}
            Preview URL (HTTP fallback): ${{ env.PREVIEW_URL_HTTP }}
