name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}

      PREVIEW_PROJECT: gesto-pr-${{ github.event.pull_request.number }}
      PREVIEW_DB: salesforce_pro_preview_pr_${{ github.event.pull_request.number }}
      PREVIEW_VOLUME: gesto_pgdata_pr_${{ github.event.pull_request.number }}

      API_PORT: 40${{ github.event.pull_request.number }}
      WEB_PORT: 61${{ github.event.pull_request.number }}

      PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.crm.demetraagronegocios.com.br

      ADMIN_EMAIL: admin+pr${{ github.event.pull_request.number }}@preview.local
      ADMIN_PASSWORD: PreviewPr${{ github.event.pull_request.number }}!123

      VPS_HOST: ${{ secrets.VPS_HOST }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Deploy preview on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
          PREVIEW_PROJECT: ${{ env.PREVIEW_PROJECT }}
          PREVIEW_DB: ${{ env.PREVIEW_DB }}
          PREVIEW_VOLUME: ${{ env.PREVIEW_VOLUME }}
          API_PORT: ${{ env.API_PORT }}
          WEB_PORT: ${{ env.WEB_PORT }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}

        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_KEY }}
          port: 22022   # 🔥 CORREÇÃO AQUI

          script: |

            set -e

            echo "=== PREVIEW CLEANUP ==="
            docker compose -p "$PREVIEW_PROJECT" -f docker-compose.yml -f docker-compose.preview.yml down --volumes --remove-orphans || true
            docker volume rm -f "$PREVIEW_VOLUME" || true

            echo "=== CLONE / UPDATE REPO ==="
            if [ ! -d "app" ]; then
              git clone https://github.com/${{ github.repository }}.git app
            fi

            cd app
            git fetch origin
            git checkout $PR_BRANCH
            git pull origin $PR_BRANCH

            echo "=== BUILD AND START ==="
            docker compose -p "$PREVIEW_PROJECT" \
              -f docker-compose.yml \
              -f docker-compose.preview.yml \
              up -d --build

            echo "=== WAIT DB HEALTH ==="
            DB_HEALTHY=false
            for i in {1..60}; do
              DB_CONTAINER=$(docker ps --filter "name=${PREVIEW_PROJECT}-db" --format "{{.ID}}")
              if [ -n "$DB_CONTAINER" ]; then
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' $DB_CONTAINER || echo "none")
                if [ "$STATUS" = "healthy" ]; then
                  echo "DB healthy"
                  DB_HEALTHY=true
                  break
                fi
              fi
              sleep 2
            done

            if [ "$DB_HEALTHY" != true ]; then
              echo "DB did not become healthy"
              docker ps -a
              exit 1
            fi

            echo "=== ENSURE PREVIEW ADMIN USER ==="
            docker compose -p "$PREVIEW_PROJECT" -f docker-compose.yml -f docker-compose.preview.yml exec -T api \
              node apps/api/dist/scripts/adminEnsureUser.js \
                --name "Admin Preview PR ${PR_NUMBER}" \
                --email "${ADMIN_EMAIL}" \
                --password "${ADMIN_PASSWORD}" \
                --role "diretor" \
                --region "Nacional"

            echo "=== CHECK API HEALTH ==="
            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${API_PORT}/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "API healthy"
                break
              fi
              sleep 2
            done

            echo "=== CHECK WEB ==="
            for i in {1..60}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${WEB_PORT} || true)
              if [ "$STATUS" = "200" ]; then
                echo "WEB healthy"
                break
              fi
              sleep 2
            done

            echo "=== PREVIEW OK ==="
            echo "URL: https://pr-${PR_NUMBER}.crm.demetraagronegocios.com.br"
